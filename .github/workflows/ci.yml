name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust workspace (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --workspace
        run: cargo build --workspace --all-targets --locked

      - name: cargo test --workspace
        run: cargo test --workspace --locked

      - name: cargo test hot-index (bincode + rkyv)
        run: cargo test -p hot-index --features bincode,rkyv --locked

  frontend:
    name: Frontend (Next.js build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/domain-availability/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: examples/domain-availability/frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build
