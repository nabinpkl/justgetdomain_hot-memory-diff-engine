services:
  api:
    container_name: justgetdomain-api
    build:
      context: .
      dockerfile: examples/domain-availability/backend/Dockerfile
    ports:
      - "${PORT:-8001}:${PORT:-8001}"
    env_file:
      - ./.env
    volumes:
      - ./examples/domain-availability/backend/data:/app/data
    restart: unless-stopped

  web:
    container_name: justgetdomain-web
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://api:${PORT:-8001}
        NEXT_PUBLIC_STATICFORMS_API_KEY: ${NEXT_PUBLIC_STATICFORMS_API_KEY}
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:${PORT:-8001}
    depends_on:
      - api
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["prod"]
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
