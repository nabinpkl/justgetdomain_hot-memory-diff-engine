services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - PORT=8000
      - RUST_LOG=${RUST_LOG:-info}
      - DATA_DIR=/app/data
      - SNAPSHOT_PATH=/app/data/snapshot.bin
      - DOMAINS_TXT_PATH=/app/data/domains.txt
      - DOMAINS_ZIP_PATH=/app/data/domains.zip
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://api:8000
        NEXT_PUBLIC_STATICFORMS_API_KEY: ${NEXT_PUBLIC_STATICFORMS_API_KEY}
    ports:
      - "3006:3006"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
