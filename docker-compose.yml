services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
      - RUST_LOG=${RUST_LOG:-info}
      - JGD_WORDLIST=${JGD_WORDLIST:-selective}
      - DATA_DIR=/app/data
      - SNAPSHOT_PATH=/app/data/snapshot.bin
      - DOMAINS_TXT_PATH=/app/data/domains.txt
      - DOMAINS_ZIP_PATH=/app/data/domains.zip
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
